name: "Miner CI: Performance & Docker"

on:
  merge_group:
    types: [checks_requested]
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  pull-requests: read

env:
  PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Check Approval Gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify approval
        run: |
          if [[ "${{ github.event_name }}" == "merge_group" ]]; then exit 0; fi
          if [[ "${{ github.event_name }}" == "pull_request_target" ]] \
             && [[ "${{ contains(github.event.pull_request.labels.*.name, 'safe-to-test') }}" == "true" ]]; then exit 0; fi
          echo "::error::Tier 2 requires merge_group or 'safe-to-test' label"
          exit 1

  detect-changes:
    runs-on: ubuntu-latest
    needs: gate
    outputs:
      pearl_gateway: ${{ steps.filter.outputs.common == 'true' || steps.filter.outputs.pearl_gateway_src == 'true' }}
      vllm_miner: ${{ steps.filter.outputs.common == 'true' || steps.filter.outputs.pearl_gateway_src == 'true' || steps.filter.outputs.miner_base_src == 'true' || steps.filter.outputs.vllm_miner_src == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ env.PR_HEAD_SHA }}
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            common:
              - '.github/workflows/miner_heavy_ci.yml'
              - 'miner/conftest.py'
              - 'miner/miner-utils/**'
              - 'pearl-blake3/**'
              - 'zk-pow/**'
              - 'py-pearl-mining/**'
              - 'pyproject.toml'
              - 'uv.lock'
            pearl_gateway_src:
              - 'miner/pearl-gateway/**'
            miner_base_src:
              - 'miner/miner-base/**'
            vllm_miner_src:
              - 'miner/vllm-miner/**'

  performance_tests:
    name: Pearl Gateway Performance Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.pearl_gateway == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
          persist-credentials: false
          ref: ${{ env.PR_HEAD_SHA }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install dependencies
        run: uv sync --package pearl-gateway --no-editable
      - name: Run performance tests
        run: uv run pytest -m performance miner/pearl-gateway

  vllm_miner_docker_test:
    name: Test Building Docker image (vLLM miner)
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.vllm_miner == 'true' }}
    runs-on: large-runner
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ env.PR_HEAD_SHA }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          file: ./miner/vllm-miner/Dockerfile
          push: false

  ci_status:
    name: Miner Heavy CI Status
    runs-on: ubuntu-latest
    needs: [performance_tests, vllm_miner_docker_test]
    if: always()
    steps:
      - run: |
          result="${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'failure' || 'success' }}"
          echo "Overall result: $result"
          [ "$result" = 'success' ]
